<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Nacho Supreme Pre-Roll Display</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a0f00;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://skoop-dev-code-agent.s3.us-east-1.amazonaws.com/n8n-continue%2Faigen-1773539029388%2Fassets%2Fnacho_bg-1773541174040.png?v=m7p2x4');
            background-size: cover;
            background-position: center;
            filter: blur(8px) brightness(0.6);
            transform: scale(1.1);
            z-index: 1;
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background-image: radial-gradient(circle, rgba(255, 183, 0, 0.15) 2px, transparent 2px);
            background-size: 60px 60px;
            opacity: 0.5;
            animation: drift 30s linear infinite;
        }

        @keyframes drift {
            from { background-position: 0 0; }
            to { background-position: 60px 60px; }
        }

        .content {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 40px;
            box-sizing: border-box;
        }

        .product-image {
            max-height: 80vh;
            max-width: 90vw;
            object-fit: contain;
            filter: drop-shadow(0 25px 40px rgba(0,0,0,0.8));
            animation: float 6s ease-in-out infinite;
            border-radius: 20px;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .info-panel {
            position: absolute;
            bottom: 40px;
            background: linear-gradient(135deg, rgba(20, 10, 0, 0.85), rgba(40, 20, 0, 0.75));
            color: white;
            padding: 20px 40px;
            border-radius: 16px;
            text-align: center;
            max-width: 80%;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 183, 0, 0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards 1s;
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .title {
            color: #ffb700;
            font-weight: 900;
            font-size: 38px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .subtitle {
            font-size: 22px;
            color: #f0e0c0;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .glow {
            position: absolute;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(255,160,0,0.2) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            border-radius: 50%;
            animation: pulseGlow 4s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes pulseGlow {
            from { opacity: 0.6; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="bg-container"></div>
    <div class="particles"></div>
    <div class="glow"></div>
    <div class="content">
        <img src="https://skoop-general.s3.us-east-1.amazonaws.com/1773541086782-fe27da41-4e56-46b1-93b0-5f9bb8069d4e.jpg?v=m7p2x4" alt="Nacho Supreme Pre-Roll" class="product-image">

        <div class="info-panel">
            <div class="title">Nacho Supreme</div>
            <div class="subtitle">1G Premium Cannabis Pre-Roll</div>
        </div>
    </div>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
